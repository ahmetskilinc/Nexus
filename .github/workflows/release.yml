name: Release

# Every push to main (including PR merges) runs checks. A release is built,
# signed, notarized, and published only when apps/desktop/package.json holds a
# version that has no v<version> GitHub release yet — bumping the version is
# what ships.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        env:
          HUGEICONS_TOKEN: ${{ secrets.HUGEICONS_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Typecheck and test
        run: bunx turbo run typecheck test

      - name: Decide whether this version needs a release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version apps/desktop/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v$VERSION already exists — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, sign, and notarize
        if: steps.version.outputs.exists == 'false'
        working-directory: apps/desktop
        env:
          # Developer ID Application certificate (.p12, base64) — electron-builder
          # imports it into a temporary CI keychain itself.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization (app via electron-builder, dmg via notarize-dmg.cjs).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run package

      - name: Publish GitHub release
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            apps/desktop/release/Nexus-*.dmg \
            --repo "$GITHUB_REPOSITORY" \
            --title "Nexus ${{ steps.version.outputs.version }}" \
            --generate-notes
